<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyLab - Recuperar senha</title>
    <link rel="stylesheet" href="/pages/login/login.css" />
    <link rel="stylesheet" href="recover-password.css">
  </head>
  <body>
    <section class="page-login">
      <div class="content">
        <div class="login-form">
          <div class="form-login-content">
            <p class="titulo">Study<strong>Lab</strong></p>
            <p class="subtitulo"><strong>Recuperar senha</strong></p>
            <div class="form">
              <form class="form-login-inputs">
                <div class="email-container">
                <label>Email cadastrado</label>
                <span class="item-email" >
                    <img src="/assets/img/@.svg" alt="@ item">
                </span>
                <input
                  type="email"
                  name="email"
                  id="email"
                  placeholder="seu e-mail"
                />
            </div>
              </div>
            </form>
            <button id="button-submit">Continuar</button>
            <div class="links-conta">
              <a href="/pages/register/register.html">Não tem uma conta? Cadastre-se</a>
            </div>
          </div>
        </div>
        <div class="links-redirecionamento">
          <a href="/pages/home/home.html">Voltar para a página inicial</a>
          <a href="/pages/terms/terms.html">Termo de serviço e Política de privacidade</a>
        </div>
      </div>
    </section>
    <script src="/assets/js/recover-password.js"></script>
  </body>
</html>
