<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyLab - Login</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <section class="page-login">
      <div class="content">
        <div class="login-form">
          <div class="form-login-content">
            <p class="titulo">Study<strong>Lab</strong></p>
            <p class="subtitulo"><strong>Entrar na sua conta</strong></p>
            <div class="form">
              <form class="form-login-inputs">
                <div class="email-container">
                <label>Email institucional</label>
                <span class="item-email" >
                    <img src="../../assets/img/@.svg" alt="@ item">
                </span>
                <input
                  type="email"
                  name="email"
                  id="email"
                  placeholder="seu email"
                />
            </div>
                <div class="password-container">
                <label>Senha</label>
                <span class="padlock-item">
                    <img src="../../assets/img/lock.svg" alt="padlock vector">
                </span>
                <input
                  type="password"
                  name="password"
                  id="password"
                  placeholder="sua senha"
                />
                <span class="toggle-password" onclick="togglePasswordVisibility()">
                <img src="../../assets/img/eye.svg" id="toggle-password" alt="Toggle Password Visibility">
                </span>
            </div>
              </div>
            </form>
            <button id="button-submit">Entrar</button>
            <div class="links-conta">
              <a href="../register/register.html">Não tem uma conta? Cadastre-se</a>
              <a href="../recover-password/recover-password.html">Esqueceu a senha? Recuperar</a>
            </div>
          </div>
        </div>
        <div class="links-redirecionamento">
          <a href="../home/home.html">Voltar para a página inicial</a>
          <a href="../terms/terms.html">Termo de serviço e Política de privacidade</a>
        </div>
      </div>
    </section>
    
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../../assets/js/login.js" type="module"></script>
  </body>
</html>
