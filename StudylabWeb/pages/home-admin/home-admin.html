<!DOCTYPE html>

  <head>

        </button>
      </div>
      <div class="user-controls">
        <a class="icon-user-control-1" href="#"
          ><img src="/assets/img/icon-sino.svg" alt=""
        /></a>
        <a id="user-icon" class="icon-user-control-2" href="#"
          ><img src="/assets/img/icon-user-header.svg" alt=""
        /></a>
      </div>
    </header>

    <div class="primary">
      <aside class="sidebar">
        <nav class="menu">
          <ul>
            <li>
              <a href="#"
                ><img
                  class="icon-sidebar"
                  src="/assets/img/icon-home.svg"

              /></a>
            </li>
            <li>
              <a href="#"
                ><img
                  class="icon-sidebar"
                  src="/assets/img/icon-book.svg"
                  alt=""
              /></a>
            </li>
            <li>
              <a href="#"
                ><img
                  class="icon-sidebar"
                  src="/assets/img/icon-user.svg"
                  alt=""
              /></a>
            </li>
            <li>
              <a href="#"
                ><img
                  class="icon-sidebar"
                  src="/assets/img/icon-folder.svg"
                  alt=""
              /></a>
            </li>
            <li>
              <a href="#"
                ><img class="icon-sidebar" src="/assets/img/icon-i.svg" alt=""
              /></a>
            </li>
            <li>
              <a href="#"
                ><img
                  class="icon-sidebar"
                  src="/assets/img/icon-help.svg"
                  alt=""
              /></a>
            </li>
          </ul>
        </nav>
      </aside>

      <main class="content"></main>
    </div>
    <script type="module" src="home-admin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </body>
</html>
