    <title>StudyLab</title>
</head>
<body>
    <header class="container-fluid">
        <nav class="container navbar">
            <div class="logo">
                <a href="../home/home.html">Study<strong>Lab</strong></a>
            </div>
            <div class="menu">
                <ul><a href="../home/home.html" class="home">Home</a></ul>
                <ul><a href="../about/about.html" class="sobre">Sobre</a></ul>
                <ul><a href="../contact/contact.html" class="contato">Contato</a></ul>
                <ul><a href="../login/login.html" class="btn-entrar">Entrar</a></ul>
                <ul><a href="../register/register.html" class="btn-criarconta">Criar minha conta</a></ul>
            </div>
            <a href="#" class="icon">&#9776;</a>

        </nav>
    </header>

    <div class="container">
        <div class="row">
            <div class="col-12 col-md-6 col-xl-6">
                <h3 class="entre-em-contato">Entre em contato com nossa equipe</h3>
            </div>
            <div class="col-12 col-md-6 col-xl-6 formulario">
                <form action="">
                    <label for="">Seu nome: <br>
                        <input type="text" name="" id="" placeholder="Nome completo" required>
                    </label>
                    <label for="">Seu email: <br>
                        <input type="email" name="" id="" placeholder="&#64; Seu email" required>
                    </label>
                    <label for="">Sua mensagem: <br>
                        <textarea name="textarea" id="" rows="7" placeholder="Sugestões ou reclamações" required></textarea>
                    </label>
                    <button class="botao-chamada">Enviar mensagem</button>
                </form>
            </div>
        </div>
    </div>
    

    <div class="footer container">
        <div class="creditos">
            <p>Desenvolvido por LearningLab</p>
        </div>
        <div class="redes">
            <p>Instagram | Linkedin</p>
        </div>
    </div>
</body>
