name: Build and Deploy to Develop

on:
  push:
    branches:
      - develop

jobs:
  ci:
    name: Build and Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image.outputs.image }}
      sha_short: ${{ steps.image.outputs.sha_short }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Image URI
        id: image
        run: |
          IMAGE_NAME=ghcr.io/learninglabufc/studylab-api
          SHA_SHORT=${GITHUB_SHA::8}

          echo "image=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "sha_short=$SHA_SHORT" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build \
            -f StudyLabAPI/Dockerfile \
            -t ${{ steps.image.outputs.image }}:latest \
            -t ${{ steps.image.outputs.image }}:${{ steps.image.outputs.sha_short }} \
            StudyLabAPI

      - name: Push Docker Image to GHCR
        run: |
          docker push ${{ steps.image.outputs.image }}:latest
          docker push ${{ steps.image.outputs.image }}:${{ steps.image.outputs.sha_short }}

  cd:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci

    environment: Develop

    steps:
      - name: Deploy New Image to Render
        run: |
          curl --request POST \
              --url https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys \
              --header 'accept: application/json' \
              --header 'authorization: Bearer ${{ secrets.RENDER_API_KEY }}' \
              --header 'content-type: application/json' \
              --data '
          {
            "imageUrl": "${{ needs.ci.outputs.image }}:${{ needs.ci.outputs.sha_short }}"
          }
          '
